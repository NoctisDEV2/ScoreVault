version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scorevault
      POSTGRES_USER: scorevault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devsecret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scorevault"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://scorevault:${POSTGRES_PASSWORD:-devsecret}@postgres:5432/scorevault
      REDIS_URL: redis://redis:6379
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file: .env
    environment:
      API_URL: http://api:4000
      REDIS_URL: redis://redis:6379
    depends_on:
      - api

  ocr:
    build:
      context: .
      dockerfile: apps/ocr/Dockerfile
    env_file: .env
    environment:
      API_URL: http://api:4000
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - api
    deploy:
      replicas: 2

volumes:
  pgdata:
